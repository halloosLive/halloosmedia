<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>حاسبة النفقة | مكتب الدغريري</title>
<meta name="description" content="احسب النفقة بسهولة واحصل على استشارة قانونية دقيقة من مكتب الدغريري">

<!-- ✅ خط Cairo الفخم والمهني -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>
/* ✅ تهيئة الخلفية */
body {
  font-family: 'Cairo', sans-serif;
  margin: 0;
  background: radial-gradient(circle at center, #1e88e5 0%, #0a4b78 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ✅ كرت الحاسبة (افتراضياً بدون تدوير لضمان عمل اللمس على الجوال) */
.calculator-box {
  width: 90%;
  max-width: 440px;
  padding: 35px 25px;
  border-radius: 24px;
  background: rgba(255, 255, 255, 0.96);
  border: 1px solid rgba(255, 255, 255, 0.5);
  box-shadow: 0px 15px 35px rgba(0, 0, 0, 0.25);
  box-sizing: border-box;
}

/* 🛠️ حل المشكلة: التأثير ثلاثي الأبعاد يشتغل فقط على أجهزة الكمبيوتر التي تدعم الماوس */
@media (hover: hover) {
  body {
    perspective: 1200px;
  }
  .calculator-box {
    transform-style: preserve-3d;
    transform: rotateX(6deg) rotateY(-4deg);
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
  }
  .calculator-box:hover {
    transform: rotateX(0deg) rotateY(0deg) scale(1.02);
    box-shadow: 0px 25px 50px rgba(0, 0, 0, 0.45);
  }
}

/* ✅ العناوين */
h3 {
  text-align: center;
  color: #0a4b78;
  font-size: 26px;
  font-weight: 700;
  margin: 0 0 10px 0;
}

.top-text {
  text-align: center;
  color: #555;
  font-size: 14px;
  margin-bottom: 25px;
}

/* ✅ حقول الإدخال */
input {
  width: 100%;
  padding: 14px;
  margin: 10px 0;
  border-radius: 12px;
  border: 2px solid #e2e8f0;
  font-size: 16px;
  font-family: inherit;
  box-sizing: border-box;
  outline: none;
  -webkit-appearance: none; /* لمنع سفاري من تغيير التصميم */
}

input:focus {
  border-color: #1e88e5;
  box-shadow: 0 0 0 3px rgba(30, 136, 229, 0.15);
}

/* ✅ زر الحساب الرئيسي المطور كلياً للجوال والآيفون */
.btn-calc {
  width: 100%;
  padding: 15px;
  background: #0a4b78;
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  margin-top: 10px;
  box-shadow: 0 4px 10px rgba(10, 75, 120, 0.25);
  
  /* خصائص هامة لـ iOS لضمان قبول النقرة فورا */
  cursor: pointer;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  -webkit-appearance: none;
}

.btn-calc:active {
  background: #10598c;
  transform: scale(0.98); /* تأثير ضغط خفيف مريح على الجوال */
}

/* ✅ صندوق النتيجة */
.result-box {
  margin-top: 20px;
  border-radius: 14px;
  font-size: 16px;
}

.result-item {
  background: #f4f8fa;
  padding: 12px 15px;
  border-radius: 10px;
  margin-bottom: 10px;
  border-right: 4px solid #1e88e5;
}

/* ✅ صندوق الـ CTA */
.cta-box {
  margin-top: 25px;
  padding: 20px;
  background: linear-gradient(135deg, #fffcf5, #ffffff);
  border-radius: 18px;
  text-align: center;
  border: 1px dashed #e4d0a0;
}

.cta-text {
  color: #333;
  font-weight: 600;
  font-size: 15px;
  margin-bottom: 18px;
}

/* ✅ زر "قدم استشارتك الآن" المجسم للجوال والكمبيوتر */
.btn-3d-container {
  position: relative;
  display: inline-block;
  width: 100%;
  height: 58px;
  margin-top: 5px;
  text-decoration: none;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}

.btn-3d-shadow {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  border-radius: 14px;
  background: #19692c;
  transform: translateY(6px);
}

.btn-3d-front {
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  width: 100%;
  height: 100%;
  border-radius: 14px;
  background: linear-gradient(135deg, #2ecc71, #28a745);
  color: #ffffff;
  font-weight: 700;
  font-size: 17px;
  box-shadow: 0 4px 8px rgba(40, 167, 69, 0.3);
  transition: transform 0.1s ease;
}

/* عند النقر أو اللمس الفعلي للزر ثلاثي الأبعاد */
.btn-3d-container:active .btn-3d-front {
  transform: translateY(6px);
}

.btn-3d-front span {
  margin-right: 8px;
  font-size: 18px;
}

/* ✅ رابط الموقع الجغرافي */
.maps-link {
  display: inline-block;
  margin-top: 18px;
  color: #0a4b78;
  font-weight: 700;
  font-size: 14px;
  text-decoration: none;
  touch-action: manipulation;
}

.maps-link:active {
  color: #1e88e5;
}
</style>

</head>

<body>

<div class="calculator-box">

  <h3>حاسبة النفقة التقريبية</h3>
  <p class="top-text">
    احسب نفقتك خلال ثوانٍ واحصل على تقدير قانوني دقيق
  </p>

  <input type="number" id="salary" inputmode="numeric" placeholder="راتب الزوج (ريال)">
  <input type="number" id="children" inputmode="numeric" placeholder="عدد الأبناء">

  <button class="btn-calc" onclick="calculate()">احسب الآن</button>

  <div id="result" class="result-box"></div>

</div>

<script>
function calculate() {
  let salary = parseFloat(document.getElementById("salary").value);
  let children = parseInt(document.getElementById("children").value);

  if (isNaN(salary) || salary <= 0 || isNaN(children) || children < 0) {
    document.getElementById("result").innerHTML = `
      <div style="color: #d9534f; padding: 12px; text-align: center; font-weight: bold;">
        ⚠️ يرجى إدخال بيانات صحيحة (الراتب والأبناء)
      </div>`;
    return;
  }

  let min = salary * 0.2;
  let max = salary * 0.3;
  
  let perChildHtml = '';
  if (children > 0) {
    let perChildMin = min / children;
    let perChildMax = max / children;
    perChildHtml = `
      <div class="result-item">
        <strong>نصيب كل طفل تقريباً:</strong> 
        <span style="color: #1e88e5; font-weight:700;">${Math.round(perChildMin)} إلى ${Math.round(perChildMax)}</span> ريال
      </div>`;
  }

  document.getElementById("result").innerHTML = `
    <div class="result-item" style="margin-top: 15px;">
      <strong>إجمالي النفقة المتوقعة:</strong> 
      <span style="color: #28a745; font-weight:700;">${Math.round(min)} إلى ${Math.round(max)}</span> ريال
    </div>
    ${perChildHtml}

    <div class="cta-box">
      <div class="cta-text">
        النفقة تتأثر بالتزامات الزوج الأخرى. احصل على تقدير قانوني دقيق ومضمون من محامينا.
      </div>
      
      <a href="https://dghreeri.com/%D8%A7%D8%B3%D8%AA%D8%B4%D8%A7%D8%B1%D8%A7%D8%AA-%D9%82%D8%A7%D9%86%D9%88%D9%86%D9%8A%D8%A9" 
         target="_blank" 
         class="btn-3d-container">
        <span class="btn-3d-shadow"></span>
        <span class="btn-3d-front">
          قدم استشارتك الآن <span>💬</span>
        </span>
      </a>

      <a href="https://www.google.com/maps?ll=16.672284,42.959138&z=16&t=m&hl=ar&gl=US&mapclient=embed&q=16%C2%B040%2720.2%22N+42%C2%B057%2732.9%22E+16.672284,+42.959138@16.6722839,42.9591377" 
         target="_blank" 
         class="maps-link">
         📍 أو تفضل بزيارة مكتبنا
      </a>
    </div>
  `;
}
</script>

</body>
</html>
